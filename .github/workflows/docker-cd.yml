name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      
      - name: Restore dependencies
        run: dotnet restore IncidentApp/AppTests.csproj
      
      - name: Run unit tests
        run: dotnet test IncidentApp/AppTests.csproj --filter "FullyQualifiedName~Tests" --verbosity normal
      
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      
      - name: Restore dependencies
        run: dotnet restore IncidentApp/AppTests.csproj
      
      - name: Run integration tests
        run: dotnet test IncidentApp/AppTests.csproj --filter "FullyQualifiedName~Integration" --verbosity normal
      
  deploy:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            dalila844/incidents-api2:latest
            dalila844/incidents-api2:1.0